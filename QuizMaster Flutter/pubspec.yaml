name: quizmaster_flutter
description: Modern Flutter rebuild of QuizMaster with bilingual onboarding.
publish_to: "none"

version: 0.1.1+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^17.2.3
  google_mobile_ads: ^5.1.0
  google_sign_in: ^6.2.1
  flutter_html: ^3.0.0
  http: ^1.2.2
  image_picker: ^1.1.2
  purchases_flutter: ^8.10.1
  share_plus: ^10.1.4
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/shop/
    - assets/images/sopa/
    - assets/images/sopa/noads/
    - assets/images/2048/
    - assets/images/win_screens/
  fonts:
    - family: Mikado
      fonts:
        - asset: assets/fonts/mikado/MikadoBold_DEMO.otf
